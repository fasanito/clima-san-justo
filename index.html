<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Weather in San Justo</title>\n    <style>\n        body { font-family: Arial, sans-serif; }\n        .weather { margin: 20px; padding: 10px; border: 1px solid #ccc; }\n    </style>\n</head>\n<body>\n    <h1>Weather in San Justo, Santa Fe</h1>\n    <div class="weather" id="weather"></div>\n    <script>\n        async function fetchWeather() {\n            const response = await fetch('https://api.openweathermap.org/data/2.5/weather?q=San%20Justo,AR&appid=YOUR_API_KEY&units=metric');\n            const data = await response.json();\n            const weatherDiv = document.getElementById('weather');\n            if (data.main) {\n                weatherDiv.innerHTML = `\n                    <h2>${data.name}</h2>\n                    <p>Temperature: ${data.main.temp} °C</p>\n                    <p>Weather: ${data.weather[0].description}</p>\n                `;\n            } else {\n                weatherDiv.innerHTML = '<p>Weather data not available.</p>';\n            }\n        }\n        fetchWeather();\n    <\/script>\n</body>\n</html>
