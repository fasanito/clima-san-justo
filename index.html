<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clima San Justo - App del Clima</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #764ba2;
        }

        .search-box button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .search-box button:hover {
            transform: translateY(-2px);
        }

        .weather-info {
            display: none;
        }

        .weather-info.active {
            display: block;
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .city-name {
            text-align: center;
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
        }

        .weather-main {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .weather-icon {
            font-size: 4em;
        }

        .temperature {
            font-size: 3em;
            font-weight: bold;
        }

        .description {
            text-transform: capitalize;
            font-size: 1.1em;
            opacity: 0.9;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .detail-box {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .detail-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 1.5em;
            color: #333;
            font-weight: bold;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            display: none;
        }

        .error.active {
            display: block;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-size: 1.2em;
            display: none;
        }

        .loading.active {
            display: block;
        }

        .location-btn {
            width: 100%;
            padding: 12px;
            background: #f5f5f5;
            border: 2px solid #ddd;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .location-btn:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .footer {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌡️ Clima San Justo</h1>
        
        <div class="search-box">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Buscar ciudad..." 
                autocomplete="off"
            >
            <button onclick="searchWeather()">Buscar</button>
        </div>

        <button class="location-btn" onclick="getLocationWeather()">📍 Mi Ubicación</button>

        <div class="loading" id="loading">Cargando clima...</div>
        <div class="error" id="error"></div>

        <div class="weather-info" id="weatherInfo">
            <div class="city-name" id="cityName"></div>
            
            <div class="weather-main">
                <div class="weather-icon" id="weatherIcon"></div>
                <div>
                    <div class="temperature" id="temperature"></div>
                    <div class="description" id="description"></div>
                </div>
            </div>

            <div class="weather-details">
                <div class="detail-box">
                    <div class="detail-label">Sensación Térmica</div>
                    <div class="detail-value" id="feelsLike"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Humedad</div>
                    <div class="detail-value" id="humidity"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Velocidad del Viento</div>
                    <div class="detail-value" id="windSpeed"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Presión</div>
                    <div class="detail-value" id="pressure"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Visibilidad</div>
                    <div class="detail-value" id="visibility"></div>
                </div>
                <div class="detail-box">
                    <div class="detail-label">Índice UV</div>
                    <div class="detail-value" id="uvIndex">-</div>
                </div>
            </div>
        </div>

        <div class="footer">
            Datos de OpenWeatherMap | Última actualización: <span id="lastUpdate">-</span>
        </div>
    </div>

    <script>
        // Clave API - Reemplaza con tu propia clave de OpenWeatherMap
        const API_KEY = 'a6d1ab0b18d71edacab5b1346b826fcc';
        const API_URL = 'https://api.openweathermap.org/data/2.5/weather';
        const GEO_API_URL = 'https://api.openweathermap.org/geo/1.0/direct';

        // Permitir buscar con Enter
        document.getElementById('cityInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                searchWeather();
            }
        });

        function showLoading(show) {
            document.getElementById('loading').classList.toggle('active', show);
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.classList.add('active');
            document.getElementById('weatherInfo').classList.remove('active');
        }

        function hideError() {
            document.getElementById('error').classList.remove('active');
        }

        function getWeatherIcon(iconCode) {
            const iconMap = {
                '01d': '☀️', '01n': '🌙',
                '02d': '⛅', '02n': '🌙',
                '03d': '☁️', '03n': '☁️',
                '04d': '☁️', '04n': '☁️',
                '09d': '🌧️', '09n': '🌧️',
                '10d': '🌧️', '10n': '🌧️',
                '11d': '⛈️', '11n': '⛈️',
                '13d': '❄️', '13n': '❄️',
                '50d': '🌫️', '50n': '🌫️'
            };
            return iconMap[iconCode] || '🌡️';
        }

        function displayWeather(data) {
            hideError();
            showLoading(false);

            const main = data.main;
            const weather = data.weather[0];
            const wind = data.wind;
            const clouds = data.clouds;
            const visibility = data.visibility;

            // Actualizar datos
            document.getElementById('cityName').textContent = 
                `${data.name}, ${data.sys.country}`;
            document.getElementById('temperature').textContent = 
                `${Math.round(main.temp)}°C`;
            document.getElementById('description').textContent = weather.description;
            document.getElementById('weatherIcon').textContent = 
                getWeatherIcon(weather.icon);
            document.getElementById('feelsLike').textContent = 
                `${Math.round(main.feels_like)}°C`;
            document.getElementById('humidity').textContent = `${main.humidity}%`;
            document.getElementById('windSpeed').textContent = 
                `${Math.round(wind.speed * 3.6)} km/h`;
            document.getElementById('pressure').textContent = 
                `${main.pressure} hPa`;
            document.getElementById('visibility').textContent = 
                `${(visibility / 1000).toFixed(1)} km`;
            document.getElementById('lastUpdate').textContent = 
                new Date().toLocaleTimeString('es-ES');

            document.getElementById('weatherInfo').classList.add('active');
        }

        async function fetchWeather(lat, lon) {
            try {
                showLoading(true);
                const response = await fetch(
                    `${API_URL}?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric&lang=es`
                );

                if (!response.ok) {
                    throw new Error('No se pudo obtener el clima');
                }

                const data = await response.json();
                displayWeather(data);
            } catch (error) {
                showError('Error al obtener el clima. Intenta de nuevo.');
                console.error(error);
            }
        }

        async function searchWeather() {
            const city = document.getElementById('cityInput').value.trim();
            
            if (!city) {
                showError('Por favor ingresa una ciudad');
                return;
            }

            try {
                showLoading(true);
                const response = await fetch(
                    `${GEO_API_URL}?q=${city}&limit=1&appid=${API_KEY}`
                );

                if (!response.ok) {
                    throw new Error('Ciudad no encontrada');
                }

                const data = await response.json();
                
                if (data.length === 0) {
                    showError('Ciudad no encontrada');
                    showLoading(false);
                    return;
                }

                const { lat, lon } = data[0];
                fetchWeather(lat, lon);
            } catch (error) {
                showError('Error al buscar la ciudad');
                showLoading(false);
                console.error(error);
            }
        }

        function getLocationWeather() {
            if (!navigator.geolocation) {
                showError('Tu navegador no soporta geolocalización');
                return;
            }

            showLoading(true);
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const { latitude, longitude } = position.coords;
                    fetchWeather(latitude, longitude);
                },
                (error) => {
                    showError('No se pudo obtener tu ubicación');
                    showLoading(false);
                    console.error(error);
                }
            );
        }

        // Cargar clima de San Justo por defecto
        window.addEventListener('load', () => {
            document.getElementById('cityInput').value = 'San Justo';
            searchWeather();
        });
    </script>
</body>
</html>
